name: check

on:
  push:
  pull_request:

jobs:
  test:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 20
          - 22

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run check

      - name: package and lifecycle smoke
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run --json > pack.json
          node -e 'const fs=require("fs"); const [pack]=JSON.parse(fs.readFileSync("pack.json","utf8")); const paths=pack.files.map((file)=>file.path); for (const required of ["bin/skillboard.mjs","src/doctor.mjs","src/source-cache.mjs","src/install-output-detector.mjs","docs/install.md"]) { if (!paths.includes(required)) throw new Error(`missing ${required}`); } for (const blocked of [".omo/","test/"]) { if (paths.some((path)=>path.startsWith(blocked))) throw new Error(`packed internal path ${blocked}`); }'
          tmp="$(mktemp -d)"
          codex_home="$(mktemp -d)"
          mkdir -p "$codex_home/skills/smoke-skill"
          printf '%s\n' '---' 'name: Smoke Skill' 'description: CI inventory smoke' '---' > "$codex_home/skills/smoke-skill/SKILL.md"
          node bin/skillboard.mjs help >/dev/null
          node bin/skillboard.mjs init --dir "$tmp" --no-scan-installed
          CODEX_HOME="$codex_home" node bin/skillboard.mjs inventory refresh --dir "$tmp" --dry-run
          CODEX_HOME="$codex_home" node bin/skillboard.mjs inventory refresh --dir "$tmp"
          grep -q 'smoke-skill' "$tmp/skillboard.config.yaml"
          node bin/skillboard.mjs doctor --dir "$tmp"
          node bin/skillboard.mjs status --dir "$tmp" --json >/dev/null
          node bin/skillboard.mjs check --config "$tmp/skillboard.config.yaml" --skills "$tmp/skills"
          printf '%s\n' 'Installed commands: $smoke-run' 'Registered hooks: post-tool-use' 'Configured MCP servers: smoke_mcp' 'Updated config: smoke-config.json' > "$tmp/install.log"
          printf '%s\n' '{"commands":["$smoke-config"],"mcpServers":{"smoke_config_mcp":{"command":"node"}}}' > "$tmp/smoke-config.json"
          node bin/skillboard.mjs inventory detect --config "$tmp/skillboard.config.yaml" --unit smoke.runtime --source "npx smoke install" --install-output "$tmp/install.log" --config-file "$tmp/smoke-config.json"
          grep -q 'smoke.runtime' "$tmp/skillboard.config.yaml"
          repo="$(mktemp -d)"
          git -C "$repo" init
          printf '%s\n' 'source smoke' > "$repo/README.md"
          git -C "$repo" add README.md
          git -C "$repo" -c user.email=ci@example.test -c user.name=SkillBoardCI commit -m init
          node --input-type=module -e 'import fs from "node:fs"; import YAML from "yaml"; const config=process.argv[1]; const repo=process.argv[2]; const doc=YAML.parseDocument(fs.readFileSync(config,"utf8")); let units=doc.get("install_units", true); if (!YAML.isMap(units)) { units=doc.createNode({}); doc.set("install_units", units); } units.set("smoke.remote", doc.createNode({ kind:"marketplace", source:`git clone file://${repo}`, scope:"user-global", enabled:true, permission_risk:"low" })); fs.writeFileSync(config, String(doc));' "$tmp/skillboard.config.yaml" "$repo"
          node bin/skillboard.mjs sources refresh --dir "$tmp" --unit smoke.remote
          grep -q 'source_digest: sha256:' "$tmp/skillboard.config.yaml"
          node bin/skillboard.mjs uninstall --dir "$tmp" --dry-run
          node bin/skillboard.mjs uninstall --dir "$tmp"
