name: check

on:
  push:
  pull_request:

jobs:
  test:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - windows-latest
        node:
          - 14
          - 20
          - 22

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install runtime dependencies on Node 14
        if: matrix.node == 14
        run: npm install --ignore-scripts --production --no-audit --no-fund

      - name: Install development dependencies
        if: matrix.node != 14
        run: npm ci

      - name: Run full checks
        if: matrix.node != 14
        run: npm run check

      - name: package and lifecycle smoke
        run: node .github/scripts/ci-package-lifecycle-smoke.mjs
