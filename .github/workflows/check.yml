name: check

on:
  push:
  pull_request:

jobs:
  test:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 20
          - 22
          - 24

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run check

      - name: package and lifecycle smoke
        run: node .github/scripts/ci-package-lifecycle-smoke.mjs
