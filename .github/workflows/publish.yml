name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: npm package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run check

      - name: Validate release tag
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const manifest = JSON.parse(readFileSync("package.json", "utf8"));
          const expected = `v${manifest.version}`;
          const actual = process.env.GITHUB_REF_NAME;

          if (actual !== expected) {
            console.error(`Release tag ${actual} does not match package version ${expected}.`);
            process.exit(1);
          }
          NODE

      - name: Check npm registry
        id: registry
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public
        if: steps.registry.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
